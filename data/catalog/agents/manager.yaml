id: manager
tool_ids:
  - web-search
  - planning
  - workspace
  - vector-store
  - knowledge-graph
card:
  role: Manager
  description: Helpful manager coordinating team work
  skills:
    - coordination
    - delegation
  agent_class: akgentic.agent.BaseAgent
  config:
    name: "@Manager"
    role: Manager
    prompt:
      template: "@team-prompt"
      params:
        role: manager
        instructions: Coordinate the team effectively.
    model_cfg:
      provider: openai
      model: gpt-4.1
      temperature: 0.3
  routes_to:
    - "@Assistant"
    - "@Expert"
